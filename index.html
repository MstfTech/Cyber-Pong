<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Cyber Pong Multiplayer</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff007f;
            --cyber-dark: #0d021a;
            --cyber-grid: #1f0b3a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--cyber-dark); color: #fff; overflow-x: hidden; }

        /* Cyberpunk Arayüz Tasarımı */
        #app-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .neon-panel { background: rgba(20, 5, 35, 0.85); border: 2px solid var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan); padding: 30px; border-radius: 8px; width: 100%; max-width: 500px; text-align: center; margin-bottom: 20px; }
        
        h1 { font-size: 2.5rem; text-shadow: 0 0 10px var(--neon-pink); color: var(--neon-pink); margin-bottom: 10px; font-weight: 900; letter-spacing: 2px; }
        p.subtitle { color: var(--neon-cyan); font-size: 0.9rem; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }

        input[type="text"] { width: 100%; padding: 12px; background: #22093b; border: 1px solid var(--neon-pink); color: #fff; border-radius: 4px; font-size: 1rem; outline: none; margin-bottom: 15px; text-align: center; }
        input[type="text"]:focus { box-shadow: 0 0 10px var(--neon-pink); }

        .btn { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: all 0.2s ease; letter-spacing: 1px; }
        .btn-cyan { background: transparent; border: 2px solid var(--neon-cyan); color: var(--neon-cyan); box-shadow: inset 0 0 5px var(--neon-cyan); }
        .btn-cyan:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
        .btn-pink { background: transparent; border: 2px solid var(--neon-pink); color: var(--neon-pink); box-shadow: inset 0 0 5px var(--neon-pink); }
        .btn-pink:hover { background: var(--neon-pink); color: #fff; box-shadow: 0 0 15px var(--neon-pink); }

        .lang-selector { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .lang-btn { background: #1a0530; border: 1px solid var(--neon-cyan); color: #fff; padding: 6px 12px; cursor: pointer; font-size: 0.8rem; border-radius: 4px; }
        .lang-btn.active { background: var(--neon-cyan); color: #000; font-weight: bold; }

        #game-screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        #canvas-wrapper { position: relative; border: 4px solid var(--neon-pink); box-shadow: 0 0 25px var(--neon-pink); border-radius: 4px; overflow: hidden; background: #000; }
        canvas { display: block; background: #000; }

        /* Karşılama Panelleri */
        .difficulty-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .difficulty-group .btn { font-size: 0.8rem; padding: 10px; }

        /* İstatistik & Rövanş Ekranı Overlays */
        #stats-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 2, 22, 0.93); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; z-index: 10; }
        .stats-grid { display: flex; gap: 30px; margin: 20px 0; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 6px; border: 1px solid var(--neon-cyan); }
        .stat-box h3 { color: var(--neon-cyan); font-size: 0.8rem; text-transform: uppercase; }
        .stat-box p { font-size: 1.8rem; font-weight: bold; color: #fff; margin-top: 5px; }

        /* Hızlı İfadeler */
        #emote-bar { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .emote-btn { background: #1a0530; border: 1px solid var(--neon-cyan); font-size: 1.5rem; padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: transform 0.1s ease; }
        .emote-btn:hover { transform: scale(1.15); background: rgba(0,240,255,0.2); }

        #waiting-overlay { display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: var(--neon-cyan); animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="app-container">
    <div class="lang-selector">
        <button class="lang-btn active" onclick="setLanguage('tr')">TR</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
    </div>

    <div id="menu-screen" class="neon-panel">
        <h1 data-key="title">CYBER PONG MULTIPLAYER</h1>
        <p class="subtitle" data-key="subtitle">Siber Dünyanın En Hızlı Pong Arenası</p>
        
        <input type="text" id="username-input" data-placeholder="namePlaceholder" placeholder="Kullanıcı Adı Girin..." value="PlayerX">

        <button class="btn btn-cyan" id="btn-mm" onclick="startMatchmaking()" data-key="playMatchmaking">Rakip Bul (Matchmaking)</button>
        <button class="btn btn-cyan" onclick="createPrivateRoom()" data-key="createPrivate">Özel Oda Oluştur</button>
        
        <div style="margin: 10px 0; display:flex; gap:5px;">
            <input type="text" id="private-code-input" data-placeholder="enterCode" placeholder="Oda Kodu Gir..." style="margin:0; width:60%;">
            <button class="btn btn-pink" onclick="joinPrivateRoom()" style="margin:0; width:40%; padding:12px;" data-key="joinPrivate">Katıl</button>
        </div>

        <div style="border-top: 1px dashed var(--neon-pink); margin: 20px 0; padding-top: 15px;">
            <p style="font-size:0.85rem; color:var(--neon-pink); margin-bottom:10px; text-transform:uppercase; font-weight:bold;" data-key="singleplayer">Tek Oyunculu (Bot)</p>
            <div class="difficulty-group">
                <button class="btn btn-cyan" onclick="startSingleplayer('easy')" data-key="easy">Kolay</button>
                <button class="btn btn-cyan" onclick="startSingleplayer('medium')" data-key="medium">Orta</button>
                <button class="btn btn-pink" onclick="startSingleplayer('hard')" data-key="hard">Zor</button>
            </div>
        </div>
    </div>

    <div id="waiting-screen" class="neon-panel" style="display:none;">
        <div id="waiting-overlay">
            <div class="spinner"></div>
            <p id="waiting-text" data-key="waitingOpponent">Siber Arena İçin Rakip Aranıyor...</p>
            <div id="private-code-display" style="margin-top: 15px; font-size: 1.2rem; font-weight: bold; color: var(--neon-pink); display: none;"></div>
            <button class="btn btn-pink" onclick="cancelQueue()" style="margin-top:20px;" data-key="cancel">İptal Et</button>
        </div>
    </div>

    <div id="game-screen">
        <div id="canvas-wrapper">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            
            <div id="stats-overlay">
                <h2 id="end-title-text" style="font-size:2.5rem; color:var(--neon-pink);">MAÇ BİTTİ</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <h3 data-key="maxSpeed">Maksimum Hız</h3>
                        <p id="stat-max-speed">0</p>
                    </div>
                    <div class="stat-box">
                        <h3 data-key="totalHits">Toplam Vuruş</h3>
                        <p id="stat-total-hits">0</p>
                    </div>
                    <div class="stat-box">
                        <h3 data-key="yourHits">Senin Vuruşların</h3>
                        <p id="stat-your-hits">0</p>
                    </div>
                </div>
                <div style="font-size: 1.1rem; margin-bottom: 25px; color: var(--neon-cyan);">
                    <span data-key="xpGranted">Kazanılan XP:</span> <span id="reward-xp" style="font-weight:bold; color:#fff;">0</span> | 
                    <span data-key="coinsGranted">Kazanılan Coin:</span> <span id="reward-coins" style="font-weight:bold; color:#fff;">0</span>
                    <div id="reward-case" style="color: gold; margin-top:5px; display:none;" data-key="caseDropped">⚡ Kasa Düştü! ⚡</div>
                </div>
                <div style="display: flex; gap: 15px; width: 100%; max-width: 400px;">
                    <button class="btn btn-cyan" id="rematch-btn" onclick="triggerRematchRequest()" data-key="rematchBtn">Yeniden Oyna</button>
                    <button class="btn btn-pink" onclick="exitToMenu()" data-key="backToMenu">Menüye Dön</button>
                </div>
            </div>
        </div>

        <div id="emote-bar">
            <button class="emote-btn" onclick="sendQuickEmote('🔥')">🔥</button>
            <button class="emote-btn" onclick="sendQuickEmote('⚡')">⚡</button>
            <button class="emote-btn" onclick="sendQuickEmote('🤖')">🤖</button>
            <button class="emote-btn" onclick="sendQuickEmote('😎')">😎</button>
            <button class="emote-btn" onclick="sendQuickEmote('👑')">👑</button>
            <button class="emote-btn" onclick="sendQuickEmote('❌')">❌</button>
        </div>
    </div>
</div>

<script>
    // --- LOKALİZASYON SİSTEMİ (100% SÜREKLİ TERCÜME SİSTEMİ) ---
    const i18n = {
        lang: 'tr',
        tr: {
            title: "CYBER PONG MULTIPLAYER",
            subtitle: "Siber Dünyanın En Hızlı Pong Arenası",
            namePlaceholder: "Kullanıcı Adı Girin...",
            playMatchmaking: "Rakip Bul (Matchmaking)",
            createPrivate: "Özel Oda Oluştur",
            joinPrivate: "Odaya Katıl",
            enterCode: "Oda Kodu Gir...",
            singleplayer: "Tek Oyunculu (Bot)",
            easy: "Kolay",
            medium: "Orta",
            hard: "Zor",
            waitingOpponent: "Siber Arena İçin Rakip Aranıyor...",
            cancel: "İptal Et",
            maxSpeed: "Maksimum Hız",
            totalHits: "Toplam Vuruş",
            yourHits: "Senin Vuruşların",
            xpGranted: "Kazanılan XP:",
            coinsGranted: "Kazanılan Coin:",
            caseDropped: "⚡ Kasa Düştü! ⚡",
            rematchBtn: "Yeniden Oyna",
            backToMenu: "Menüye Dön",
            win: "ZAFER! SİBER ARENAYI ELE GEÇİRDİN",
            lose: "BOZGUN! SİSTEM DEVREDİŞİ BIRAKILDI",
            countdownGo: "BAŞLA!",
            rematchWaiting: "Rakip Bekleniyor...",
            opponentLeft: "Rakip bağlantıyı kesti! Maç bitti."
        },
        en: {
            title: "CYBER PONG MULTIPLAYER",
            subtitle: "The Fastest Pong Arena in the Cyber World",
            namePlaceholder: "Enter Username...",
            playMatchmaking: "Find Match (Matchmaking)",
            createPrivate: "Create Private Room",
            joinPrivate: "Join Private Room",
            enterCode: "Enter Room Code...",
            singleplayer: "Singleplayer (Bot Mode)",
            easy: "Easy",
            medium: "Medium",
            hard: "Hard",
            waitingOpponent: "Searching for Opponent in Cyber Arena...",
            cancel: "Cancel",
            maxSpeed: "Maximum Speed",
            totalHits: "Total Hits",
            yourHits: "Your Hits",
            xpGranted: "XP Granted:",
            coinsGranted: "Coins Granted:",
            caseDropped: "⚡ Case Dropped! ⚡",
            rematchBtn: "Rematch",
            backToMenu: "Back to Menu",
            win: "VICTORY! CYBER ARENA SECURED",
            lose: "DEFEAT! SYSTEM SHUT DOWN",
            countdownGo: "GO!",
            rematchWaiting: "Waiting for Opponent...",
            opponentLeft: "Opponent left! Match closed."
        }
    };

    function setLanguage(l) {
        i18n.lang = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        updateUILanguage();
    }

    function updateUILanguage() {
        const currentDict = i18n[i18n.lang];
        document.querySelectorAll('[data-key]').forEach(el => {
            const k = el.getAttribute('data-key');
            if (currentDict[k]) el.innerText = currentDict[k];
        });
        document.querySelectorAll('[data-placeholder]').forEach(el => {
            const k = el.getAttribute('data-placeholder');
            if (currentDict[k]) el.setAttribute('placeholder', currentDict[k]);
        });
    }

    // --- OYUN PARAMETRELERİ VE İSTEMCİ MOTORU ---
    const socket = io();
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let myProfile = { name: "PlayerX", level: 1, xp: 0 };
    let side = 'left';
    let opponentProfile = null;
    let mode = 'menu'; // menu, queue, multiplayer, singleplayer
    let isLoopRunning = false;

    // Dinamik Senkronizasyon Hedefleri (Interpolation)
    let ball = { x: 400, y: 300, radius: 8 };
    let targetBall = { x: 400, y: 300 };
    let p1 = { y: 250, score: 0, targetY: 250, grown: false };
    let p2 = { y: 250, score: 0, targetY: 250, grown: false };
    
    // Gelişmiş Efekt Hafızaları
    let ballTrail = []; // GÖREV 4.1: Neon Ball Trail dizisi
    let shakeIntensity = 0; // GÖREV 4.2: Screen Shake derecesi
    let bgPulse = 0; // GÖREV 4.9: Audio/Visual Vuruş Işığı pulse derecesi
    let powerupState = { active: false, x: 0, y: 0, type: 0 };
    let countdownText = "";
    let activeEmotes = {}; // Oyuncu id'sine göre baloncuklar

    // Bot Yapay Zeka Hız Ayarları
    let botDifficulty = 'medium';
    let botSpeed = 4.5;

    // --- SES MOTORU (Müzikal & Ses Senkronizasyonu) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSynthSound(frequency, type, duration) {
        try {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch(e){}
    }

    // --- SOKET BAĞLANTILARI VE VERİ PROTOKOLLERİ ---
    socket.on('waiting', (msg) => {
        showScreen('waiting-screen');
        document.getElementById('private-code-display').style.display = 'none';
    });

    socket.on('privateRoomCreated', (data) => {
        showScreen('waiting-screen');
        const codeDisplay = document.getElementById('private-code-display');
        codeDisplay.innerText = (i18n.lang === 'tr' ? "ODA KODU: " : "ROOM CODE: ") + data.code;
        codeDisplay.style.display = 'block';
    });

    socket.on('privateRoomError', (err) => {
        alert(err);
        exitToMenu();
    });

    socket.on('init', (data) => {
        side = data.side;
        opponentProfile = data.opponent;
        document.getElementById('stats-overlay').style.display = 'none';
        showScreen('game-screen');
        mode = 'multiplayer';
        ballTrail = [];
        activeEmotes = {};
        if (!isLoopRunning) { isLoopRunning = true; renderLoop(); }
    });

    socket.on('countdownUpdate', (val) => {
        if(val > 0) {
            countdownText = val.toString();
        } else {
            countdownText = i18n[i18n.lang].countdownGo;
        }
        bgPulse = 20; // Parlama
    });

    socket.on('startGame', () => {
        setTimeout(() => { countdownText = ""; }, 1000);
    });

    socket.on('playSound', (data) => {
        // GÖREV 4.9: Audio/Visual Sync & 4.2 Screen Shake tetiklenmesi
        if (data.shake) shakeIntensity = 12;
        bgPulse = 15;
        if (data.type === 'wallHit') playSynthSound(180, 'square', 0.08);
        if (data.type === 'paddleHit') playSynthSound(440, 'triangle', 0.12);
        if (data.type === 'score') playSynthSound(220, 'sawtooth', 0.3);
        if (data.type === 'powerup') playSynthSound(600, 'sine', 0.25);
    });

    socket.on('powerupActivated', (data) => {
        bgPulse = 25;
    });

    socket.on('receiveEmote', (data) => {
        // GÖREV 4.8: İfadeyi ekranda gösterme hafızası
        activeEmotes[data.id] = { text: data.emote, expiry: Date.now() + 2500 };
    });

    socket.on('opponentRequestedRematch', () => {
        const btn = document.getElementById('rematch-btn');
        btn.innerText = i18n.lang === 'tr' ? "MEYDAN OKUNDU! KABUL ET" : "CHALLENGED! ACCEPT";
        btn.classList.add('btn-pink');
    });

    socket.on('rematchStarted', () => {
        document.getElementById('stats-overlay').style.display = 'none';
        const btn = document.getElementById('rematch-btn');
        btn.innerText = i18n[i18n.lang].rematchBtn;
        btn.disabled = false;
        ballTrail = [];
        activeEmotes = {};
    });

    socket.on('opponentLeft', () => {
        alert(i18n[i18n.lang].opponentLeft);
        exitToMenu();
    });

    // Sunucu Ağ Paket Ayrıştırması ve Yumuşatma (Lerp Altyapısı)
    socket.on('gs', (state) => {
        if (mode !== 'multiplayer') return;
        
        // GÖREV 4.5: Ağ Verisi Hedef Atamaları (Smooth Interpolation için)
        targetBall.x = state.b[0];
        targetBall.y = state.b[1];
        
        p1.targetY = state.p[0];
        p1.score = state.p[1];
        p1.grown = state.p[2] === 1;

        p2.targetY = state.p[3];
        p2.score = state.p[4];
        p2.grown = state.p[5] === 1;

        powerupState.active = state.pw[0] === 1;
        powerupState.x = state.pw[1];
        powerupState.y = state.pw[2];
        powerupState.type = state.pw[3];
    });

    // [BUG FIX] OYUN SONU EKRAN DONMASI ÇÖZÜMÜ VE KİLİTLENMEYEN STATS PANELİ
    socket.on('gameOver', (data) => {
        mode = 'menu'; // İletişim döngüsünü durdurmadan menü moduna çek
        document.getElementById('end-title-text').innerText = data.winner === side ? i18n[i18n.lang].win : i18n[i18n.lang].lose;
        document.getElementById('stat-max-speed').innerText = data.stats.maxSpeed;
        document.getElementById('stat-total-hits').innerText = data.stats.totalHits;
        document.getElementById('stat-your-hits').innerText = data.stats.yourHits;
        document.getElementById('reward-xp').innerText = "+" + data.credits;
        document.getElementById('reward-coins').innerText = "+" + Math.floor(data.credits / 2);
        document.getElementById('stats-overlay').style.display = 'flex';

        myProfile.xp += data.credits;
        socket.emit('reportStats', myProfile);
    });

    socket.on('singleplayerReward', (data) => {
        if (data.error) {
            alert(data.error);
            exitToMenu();
            return;
        }
        document.getElementById('end-title-text').innerText = i18n[i18n.lang].win;
        document.getElementById('stat-max-speed').innerText = "BOT";
        document.getElementById('stat-total-hits').innerText = "—";
        document.getElementById('stat-your-hits').innerText = "—";
        document.getElementById('reward-xp').innerText = "+" + data.xp_granted;
        document.getElementById('reward-coins').innerText = "+" + data.coins_granted;
        document.getElementById('reward-case').style.display = data.case_dropped ? 'block' : 'none';
        document.getElementById('stats-overlay').style.display = 'flex';
        
        // Yeniden oyna butonunu bot için gizle
        document.getElementById('rematch-btn').style.display = 'none';

        myProfile.xp += data.xp_granted;
        socket.emit('reportStats', myProfile);
    });

    // --- İSTEMCİ HAREKET GİRDİLERİ (MOUSE / TOUCH) ---
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseY = e.clientY - rect.top - 50; // Merkezleme
        if (mode === 'multiplayer') {
            socket.emit('move', { y: mouseY });
        } else if (mode === 'singleplayer') {
            if (side === 'left') p1.y = Math.max(0, Math.min(mouseY, 500));
            else p2.y = Math.max(0, Math.min(mouseY, 500));
        }
    });

    // --- GÖREV FONKSİYONLARI ---
    function startMatchmaking() {
        getProfileData();
        socket.emit('joinMatchmaking', myProfile);
    }

    function createPrivateRoom() {
        getProfileData();
        socket.emit('createPrivateRoom', myProfile);
    }

    function joinPrivateRoom() {
        getProfileData();
        const code = document.getElementById('private-code-input').value;
        if(!code) return;
        socket.emit('joinPrivateRoom', { code: code, profile: myProfile });
    }

    function cancelQueue() {
        socket.emit('cancelMatchmaking');
        socket.emit('cancelPrivateRoom');
        exitToMenu();
    }

    function triggerRematchRequest() {
        document.getElementById('rematch-btn').innerText = i18n[i18n.lang].rematchWaiting;
        document.getElementById('rematch-btn').disabled = true;
        socket.emit('requestRematch');
    }

    function sendQuickEmote(em) {
        if (mode === 'multiplayer') {
            socket.emit('sendEmote', em);
        }
    }

    function startSingleplayer(diff) {
        getProfileData();
        botDifficulty = diff;
        if (diff === 'easy') { botSpeed = 3.5; }
        else if (diff === 'medium') { botSpeed = 5.5; }
        else if (diff === 'hard') { botSpeed = 8.5; }

        document.getElementById('stats-overlay').style.display = 'none';
        document.getElementById('rematch-btn').style.display = 'none'; // Botta kapat
        showScreen('game-screen');
        
        mode = 'singleplayer';
        side = 'left';
        
        // Bot Maç Başlangıç Durumları
        p1.y = 250; p1.score = 0; p1.grown = false;
        p2.y = 250; p2.score = 0; p2.grown = false;
        ball.x = 400; ball.y = 300;
        ball.dx = 5; ball.dy = 3;
        ballTrail = [];
        countdownText = "";
        
        socket.emit('startSingleplayer', botDifficulty);
        if (!isLoopRunning) { isLoopRunning = true; renderLoop(); }
    }

    function exitToMenu() {
        mode = 'menu';
        document.getElementById('stats-overlay').style.display = 'none';
        document.getElementById('rematch-btn').style.display = 'block';
        showScreen('menu-screen');
    }

    function getProfileData() {
        const name = document.getElementById('username-input').value.trim();
        if (name) myProfile.name = name;
    }

    function showScreen(id) {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('waiting-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById(id).style.display = 'flex';
    }

    // --- GÖREV 4: 2D GRAFİK MOTORU VE YENİ ÖZELLİKLER RENDERING ---
    function renderLoop() {
        if (mode === 'menu') { isLoopRunning = false; return; } // Akışı kes, dondurma
        
        // GÖREV 4.2: Screen Shake Uygulaması
        ctx.save();
        if (shakeIntensity > 0) {
            const dx = (Math.random() - 0.5) * shakeIntensity;
            const dy = (Math.random() - 0.5) * shakeIntensity;
            ctx.translate(dx, dy);
            shakeIntensity *= 0.85; // Sönümleme
            if (shakeIntensity < 0.5) shakeIntensity = 0;
        }

        // İptal edilmeyen temiz çizim
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 800, 600);

        // GÖREV 4.6: Responsive Cyber Grid Background Alanı
        drawCyberGrid();

        // Yerel Simülasyon Yumuşatması (Lerp / Smooth Interpolation)
        if (mode === 'multiplayer') {
            ball.x += (targetBall.x - ball.x) * 0.35;
            ball.y += (targetBall.y - ball.y) * 0.35;
            p1.y += (p1.targetY - p1.y) * 0.3;
            p2.y += (p2.targetY - p2.y) * 0.3;
        } else if (mode === 'singleplayer') {
            runLocalBotLogic();
        }

        // GÖREV 4.1: Neon Ball Trail Kayıt ve Çizimi
        ballTrail.push({ x: ball.x, y: ball.y });
        if (ballTrail.length > 12) ballTrail.shift();
        for (let i = 0; i < ballTrail.length; i++) {
            const ratio = i / ballTrail.length;
            ctx.beginPath();
            ctx.arc(ballTrail[i].x, ballTrail[i].y, ball.radius * ratio, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0, 240, 255, ${ratio * 0.28})`;
            ctx.fill();
        }

        // Ana Top Çizimi (Neon Glow)
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f0ff';
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.shadowBlur = 0; // Reset

        // Raketleri Çiz (Geliştirilmiş Neon ve Dinamik Boyut)
        const h1 = p1.grown ? 150 : 100;
        const h2 = p2.grown ? 150 : 100;

        // Sol Raket (Cyan Neon)
        ctx.fillStyle = varColor('--neon-cyan');
        ctx.shadowBlur = p1.grown ? 25 : 10;
        ctx.shadowColor = varColor('--neon-cyan');
        ctx.fillRect(20, p1.y, 12, h1);

        // Sağ Raket (Pink Neon)
        ctx.fillStyle = varColor('--neon-pink');
        ctx.shadowBlur = p2.grown ? 25 : 10;
        ctx.shadowColor = varColor('--neon-pink');
        ctx.fillRect(800 - 32, p2.y, 12, h2);
        ctx.shadowBlur = 0;

        // GÖREV 4.3: Dynamic Power-ups Nesnesi Çizimi
        if (powerupState.active) {
            ctx.beginPath();
            ctx.arc(powerupState.x, powerupState.y, 18, 0, Math.PI * 2);
            ctx.shadowBlur = 20;
            if (powerupState.type === 0) {
                ctx.shadowColor = '#ff00ea';
                ctx.fillStyle = 'rgba(255, 0, 234, 0.8)'; // Genişletici
            } else {
                ctx.shadowColor = '#ff9d00';
                ctx.fillStyle = 'rgba(255, 157, 0, 0.8)'; // Süper Hızlandırıcı
            }
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // İç Sembol Çekirdeği
            ctx.fillStyle = '#fff';
            ctx.font = "bold 12px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(powerupState.type === 0 ? "⚡" : "🔥", powerupState.x, powerupState.y);
        }

        // Skorları Yazdır
        ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.font = "900 70px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(p1.score, 250, 100);
        ctx.fillText(p2.score, 800 - 250, 100);

        // GÖREV 4.8: Hızlı İfade Baloncukları Rendering Modülü
        drawPaddleEmotes();

        // GÖREV 4.4: Visual Match Countdown Çizimi
        if (countdownText !== "") {
            ctx.fillStyle = '#fff';
            ctx.font = "black 90px sans-serif";
            ctx.textAlign = "center";
            ctx.shadowBlur = 30;
            ctx.shadowColor = varColor('--neon-pink');
            ctx.fillText(countdownText, 400, 300);
            ctx.shadowBlur = 0;
        }

        ctx.restore();
        requestAnimationFrame(renderLoop);
    }

    function drawCyberGrid() {
        ctx.strokeStyle = varColor('--cyber-grid');
        ctx.lineWidth = 1;
        // GÖREV 4.9: Sekme hissi için pulse çarpanı ekleme
        const thicknessFactor = bgPulse > 0 ? (bgPulse / 5) : 0;
        if (bgPulse > 0) bgPulse *= 0.9;

        ctx.lineWidth = 1 + thicknessFactor;
        
        // Dikey ve yatay çizgiler döngüsü
        for (let x = 0; x < 800; x += 50) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, 600);
            ctx.stroke();
        }
        for (let y = 0; y < 600; y += 50) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(800, y);
            ctx.stroke();
        }
    }

    function drawPaddleEmotes() {
        ctx.font = "30px sans-serif";
        ctx.textAlign = "center";
        const now = Date.now();
        for (const id in activeEmotes) {
            const em = activeEmotes[id];
            if (now > em.expiry) { delete activeEmotes[id]; continue; }
            
            // Eğer çok oyunculuysa socket.id'ye göre eşleştir, değilse taraflara göre çiz
            if (mode === 'multiplayer') {
                if (id === socket.id) {
                    ctx.fillText(em.text, side === 'left' ? 45 : 800 - 45, side === 'left' ? p1.y - 15 : p2.y - 15);
                } else {
                    ctx.fillText(em.text, side === 'left' ? 800 - 45 : 45, side === 'left' ? p2.y - 15 : p1.y - 15);
                }
            }
        }
    }

    function runLocalBotLogic() {
        // İstemci tarafı bağımsız fizik simülatörü (Tek Oyunculu)
        ball.x += ball.dx;
        ball.y += ball.dy;

        // Duvar sekmesi
        if (ball.y - ball.radius <= 0 || ball.y + ball.radius >= 600) {
            ball.dy *= -1;
            shakeIntensity = 5;
            playSynthSound(180, 'square', 0.05);
        }

        // Basit Bot Yapay Zekası Takibi (GÖREV 5 mantığı)
        const botTargetY = ball.y - 50;
        const diffY = botTargetY - p2.y;
        if (Math.abs(diffY) > 10) {
            p2.y += Math.sign(diffY) * botSpeed;
        }
        p2.y = Math.max(0, Math.min(p2.y, 500));

        // Oyuncu Raket Çarpışması
        if (ball.x - ball.radius <= 32 && ball.x + ball.radius >= 20 && ball.y >= p1.y && ball.y <= p1.y + 100) {
            if (ball.dx < 0) {
                ball.dx = -ball.dx * 1.05;
                playSynthSound(440, 'triangle', 0.1);
            }
        }
        // Bot Raket Çarpışması
        if (ball.x + ball.radius >= 800 - 32 && ball.x - ball.radius <= 800 - 20 && ball.y >= p2.y && ball.y <= p2.y + 100) {
            if (ball.dx > 0) {
                ball.dx = -ball.dx * 1.05;
                playSynthSound(440, 'triangle', 0.1);
            }
        }

        // Skor kontrolü
        if (ball.x < 0) {
            p2.score++;
            checkLocalMatchEnd();
        } else if (ball.x > 800) {
            p1.score++;
            checkLocalMatchEnd();
        }
    }

    function checkLocalMatchEnd() {
        playSynthSound(220, 'sawtooth', 0.25);
        if (p1.score >= 5 || p2.score >= 5) {
            const playerWon = p1.score >= 5;
            mode = 'menu';
            socket.emit('singleplayerResult', { win: playerWon, difficulty: botDifficulty });
        } else {
            ball.x = 400; ball.y = 300;
            ball.dx = Math.random() < 0.5 ? 5 : -5;
            ball.dy = (Math.random() - 0.5) * 6;
        }
    }

    function varColor(name) {
        return name === '--neon-cyan' ? '#00f0ff' : name === '--neon-pink' ? '#ff007f' : '#1f0b3a';
    }

    // İlk dil güncellemesi
    updateUILanguage();
</script>
